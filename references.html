<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | References</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.85); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text); min-height: 100vh;}

/* THE BRANDING KILLER */
footer, [id*="tesla"], [class*="tesla"], .tsa-footer { display: none !important; opacity: 0 !important; visibility: hidden !important; height: 0 !important; pointer-events: none !important; }

.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}
header{padding:2rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:1000;}
header h1{font-weight:800; color:var(--accent); font-size:1.5rem;}
nav a{margin-left:1.2rem;color:var(--muted);text-decoration:none;font-weight:600;font-size:0.85rem;}
nav a.active{color:var(--accent);}

.container{max-width:1100px; margin:0 auto; padding:2rem;}
.doc-section{background:var(--panel); padding:2rem; border-radius:24px; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(12px); margin-bottom:3rem;}
h2{margin-bottom:1.5rem; color:var(--accent2); font-weight:800; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 15px;}

.evidence-img{width:100%; border-radius:12px; border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; display: block;}
.pdf-viewer{width:100%; height:600px; border-radius:12px; border:none; background: white;}
</style>
</head>
<body>

<div class="grid-lines"></div>

<header>
  <h1>CivicLink OS</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="resources.html">Resource Hub</a>
    <a href="submit.html">Add Resource</a>
    <a href="events.html">Events</a>
    <a href="volunteer.html">Volunteer</a>
    <a href="about.html">About</a>
    <a href="references.html" class="active">References</a>
  </nav>
</header>

<div class="container">

  <div class="doc-section">
    <h2>TSA Work Logs</h2>
    <img src="/public/SC1.png" alt="Work Log Page 1" class="evidence-img">
    
    <img src="/public/SC2.png" alt="Work Log Page 2" class="evidence-img">
  </div>

  <div class="doc-section">
    <h2>Student Copyright Checklist</h2>
    <embed src="/public/kami.pdf" type="application/pdf" class="pdf-viewer" />
  </div>

</div>

</body>
</html>
