<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | References</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.85); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text); min-height: 100vh;}

/* THE BRANDING KILLER */
footer, .tsa-branding, [id*="tesla"], [class*="tesla"] { 
    display: none !important; 
    opacity: 0 !important; 
    visibility: hidden !important; 
    height: 0 !important; 
}

.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}
header{padding:2rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:100;}
header h1{font-weight:800; color:var(--accent); font-size:1.5rem;}
nav a{margin-left:1.2rem;color:var(--muted);text-decoration:none;font-weight:600;font-size:0.85rem;}
nav a.active{color:var(--accent);}
.panel{max-width:900px; margin:4rem auto; background:var(--panel); padding:3rem; border-radius:24px; border:1px solid var(--accent2); backdrop-filter:blur(12px);}
table{width:100%; border-collapse:collapse; margin-top:2rem;}
th, td{text-align:left; padding:12px; border-bottom:1px solid rgba(255,255,255,0.1);}
.btn{background:var(--accent); color:#000; padding:12px 20px; text-decoration:none; border-radius:10px; font-weight:bold; display:inline-block; margin-top:20px; transition: 0.3s;}
.btn:hover{filter: brightness(1.1); box-shadow: 0 0 15px rgba(61, 242, 194, 0.3);}
</style>
</head>
<body>
<div class="grid-lines"></div>
<header>
  <h1>CivicLink OS</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="resources.html">Resource Hub</a>
    <a href="submit.html">Add Resource</a>
    <a href="events.html">Events</a>
    <a href="volunteer.html">Volunteer</a>
    <a href="about.html">About</a>
    <a href="references.html" class="active">References</a>
  </nav>
</header>
<div class="panel">
  <div style="font-family:monospace; color:var(--accent); margin-bottom:10px;">COMPLIANCE_LOG_v2.0</div>
  <h2>Compliance Documentation</h2>
  <a href="copyright-checklist.pdf" class="btn" target="_blank">Copyright Checklist</a>
  <a href="work-log.pdf" class="btn" target="_blank" style="background:var(--accent2); margin-left:10px;">Work Log</a>
  <table>
    <tr><th>Asset</th><th>Source</th></tr>
    <tr><td>Inter Typography</td><td>Google Fonts (OFL)</td></tr>
    <tr><td>UI Architecture</td><td>Chapter Team 1 (Development Lead)</td></tr>
    <tr><td>Grid System</td><td>Custom CSS Grid Framework</td></tr>
  </table>
</div>

</body>
</html>
