<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Events</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.9); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg); color:var(--text);}
.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}
header{padding:2rem; display:flex; justify-content:space-between; align-items:center;}
nav a{margin-left:1.5rem; color:var(--muted); text-decoration:none; font-weight:600;}
.container{max-width:1100px; margin:0 auto; padding:2rem;}
.event-card{background:var(--panel); border:1px solid rgba(255,255,255,0.1); border-radius:20px; padding:2rem; margin-bottom:1.5rem;}
.countdown{font-family:monospace; color:var(--accent2); font-weight:800; font-size:1.2rem; margin-top:10px;}
</style>
</head>
<body>
<div class="grid-lines"></div>
<header><h1>Events</h1><nav><a href="index.html">Dashboard</a><a href="resources.html">Resource Hub</a><a href="events.html" style="color:var(--accent)">Events</a></nav></header>
<div class="container">
  <div class="event-card" data-date="2026-05-20T18:00:00">
    <h3>Community Tech Expo</h3>
    <p>Showcasing local student innovation.</p>
    <div class="countdown"></div>
  </div>
</div>
<script>
function timer(){
  document.querySelectorAll('.event-card').forEach(c => {
    let diff = new Date(c.dataset.date) - new Date();
    if(diff>0){
      let d=Math.floor(diff/8.64e7), h=Math.floor((diff%8.64e7)/3.6e6), m=Math.floor((diff%3.6e6)/6e4), s=Math.floor((diff%6e4)/1000);
      c.querySelector('.countdown').innerText = `${d}d ${h}h ${m}m ${s}s`;
    }
  });
}
setInterval(timer, 1000); timer();
</script>
</body>
</html>
