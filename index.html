<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f1a;
  --panel:rgba(18,26,47,0.85);
  --accent:#3df2c2;
  --accent2:#5aa9ff;
  --text:#e6ebff;
  --muted:#9aa4c7;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}
.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;animation: movegrid 50s linear infinite;}
@keyframes movegrid {0%{background-position:0 0;}100%{background-position:100px 100px;}}

header{padding:2rem;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;}
header h1{font-weight:800; color:var(--accent); letter-spacing:-1px;}
nav a{margin-left:1.5rem;color:var(--muted);text-decoration:none;font-weight:600;transition:0.3s;font-size:0.9rem;}
nav a:hover, nav a.active{color:var(--accent);}

.hero{text-align:center; padding:4rem 2rem;}
.hero h2{font-size:3.5rem; margin-bottom:1rem; font-weight:800;}

/* Impact Dashboard Styles */
.impact-container{display:grid; grid-template-columns:repeat(4, 1fr); gap:1.5rem; max-width:1100px; margin:-2rem auto 3rem auto; position:relative; z-index:5;}
.stat-card{background:rgba(18,26,47,0.9); border:1px solid var(--accent); padding:1.5rem; border-radius:15px; text-align:center; backdrop-filter:blur(10px);}
.stat-number{display:block; font-size:2rem; font-weight:800; color:var(--accent2);}
