<h2>Community Resource Directory</h2>
<p>Search and filter local resources by category.</p>

<h2>Featured Community Resources (Top 3)</h2>

<div class="resource-card" data-category="food">Northwest Food Collective</div>
<div class="resource-card" data-category="health">Community Health Bridge</div>
<div class="resource-card" data-category="education">Puget Sound Youth Tech</div>

<input id="search" placeholder="Search...">
<select id="categoryFilter">
<option value="all">All</option>
<option value="food">Food</option>
<option value="health">Health</option>
<option value="education">Education</option>
</select>

<div class="resource-card" data-category="food">Food Bank</div>
<div class="resource-card" data-category="health">Clinic</div>
<div class="resource-card" data-category="education">Tutoring</div>

<script>
function filterResources(){
let q=document.getElementById("search").value.toLowerCase();
let c=document.getElementById("categoryFilter").value;

document.querySelectorAll(".resource-card").forEach(card=>{
let matchText=card.textContent.toLowerCase().includes(q);
let matchCat=(c==="all"||card.dataset.category===c);
card.style.display=(matchText&&matchCat)?"block":"none";
});
}
search.onkeyup=filterResources;
categoryFilter.onchange=filterResources;
</script>

</body>
</html>
