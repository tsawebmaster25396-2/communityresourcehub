<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | Global Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.85); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}

.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}

header{padding:2rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:1000;}
header h1{font-weight:800; color:var(--accent); font-size:1.5rem;}
nav a{margin-left:1.2rem;color:var(--muted);text-decoration:none;font-weight:600;font-size:0.85rem;}
nav a.active{color:var(--accent);}

.hero{text-align:center; padding:3rem 2rem 1rem 2rem;}

/* --- THE GLOBAL MAP INTERFACE --- */
#map {
    max-width: 1100px; margin: 0 auto 3rem auto;
    height: 500px; 
    border-radius: 24px; 
    border: 2px solid var(--accent); 
    background: #070a14;
    box-shadow: 0 0 30px rgba(61,242,194,0.1);
    z-index: 1;
}

/* Stylizing Leaflet to match the OS theme */
.leaflet-container { background: #070a14 !important; }
.leaflet-tile-pane { filter: brightness(0.6) invert(1) contrast(3) hue-rotate(200deg) saturate(0.3) brightness(0.7); }
.leaflet-popup-content-wrapper { background: var(--panel); color: var(--text); border: 1px solid var(--accent); border-radius: 12px; }
.leaflet-popup-tip { background: var(--accent); }

.search-bar-container { max-width: 1100px; margin: 0 auto 2rem auto; }
#searchBox {
    width: 100%; background: var(--panel); border: 1px solid rgba(255,255,255,0.1); 
    padding: 1.2rem; border-radius: 24px; color: var(--text);
    backdrop-filter: blur(12px); outline: none; border-left: 4px solid var(--accent);
}

.panel{background:var(--panel); border-radius:24px; padding:3rem; margin:2rem auto; max-width:1100px; border:1px solid rgba(255,255,255,0.1); backdrop-filter:blur(12px);}
.spotlight-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:2rem;}
.spotlight-card{background:rgba(255,255,255,0.03); padding:1.5rem; border-radius:20px; border-left:4px solid var(--accent2);}

footer{text-align:center; padding:3rem; color:var(--muted); font-size:0.8rem; border-top:1px solid rgba(255,255,255,0.05);}
</style>
</head>
<body>

<div class="grid-lines"></div>

<header>
  <h1>CivicLink OS</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="resources.html" class="active">Resource Hub</a>
    <a href="submit.html">Add Resource</a>
    <a href="events.html">Events</a>
    <a href="volunteer.html">Volunteer</a>
  </nav>
</header>

<section class="hero">
    <h2>Global Operations Map</h2>
    <p style="color:var(--muted)">v2.0.6 Live Event Tracking System</p>
</section>

<div id="map"></div>

<div class="search-bar-container">
    <input type="text" id="searchBox" placeholder="FILTER_NETWORK_NODES..." onkeyup="filter()">
</div>

<div class="panel">
  <div class="spotlight-grid" id="resourceGrid">
    <div class="spotlight-card">
        <h4 style="color:var(--accent)">System Instructions</h4>
        <p style="font-size:0.9rem; color:var(--muted);">Click on map pins to view active event data and local resource nodes.</p>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // INITIALIZE MAP
  const map = L.map('map').setView([20, 0], 2); // World view

  // LOAD TILES (Styled via CSS Filter)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
  }).addTo(map);

  // ADD EVENT MARKERS (Actual locations)
  const events = [
      { name: "Oasis Center", lat: 34.0522, lng: -118.2437, info: "LA Health Support Node" },
      { name: "TechForward", lat: 47.6062, lng: -122.3321, info: "Seattle STEM Mentoring" },
      { name: "Harbor Base", lat: 40.7128, lng: -74.0060, info: "NY Nutritional Aid" },
      { name: "Civic Justice", lat: 51.5074, lng: -0.1278, info: "London Legal Hub" }
  ];

  events.forEach(e => {
      L.marker([e.lat, e.lng]).addTo(map)
       .bindPopup(`<b>${e.name}</b><br>${e.info}`);
  });

  function filter() {
      let val = document.getElementById('searchBox').value.toLowerCase();
      let cards = document.getElementsByClassName('spotlight-card');
      for(let card of cards) {
          card.style.display = card.innerText.toLowerCase().includes(val) ? "block" : "none";
      }
  }
</script>
</body>
</html>
