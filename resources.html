<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | Resource Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.9); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg); color:var(--text); line-height:1.6; min-height:100vh;}
.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}

header{padding:2rem; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; background:rgba(11,15,26,0.8); backdrop-filter:blur(10px); z-index:1000; border-bottom:1px solid rgba(255,255,255,0.05);}
header h1{font-weight:800; color:var(--accent); font-size:1.5rem;}
nav a{margin-left:1.5rem; color:var(--muted); text-decoration:none; font-weight:600; transition:0.3s; font-size:0.9rem;}
nav a:hover, nav a.active{color:var(--accent);}

.container{max-width:1100px; margin:0 auto; padding:2rem;}
.breadcrumb{color:var(--muted); font-size:0.75rem; font-family:monospace; margin-bottom:1.5rem; text-transform:uppercase; letter-spacing:1px;}

.controls{display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap;}
input, select, .view-btn{background:var(--panel); border:1px solid rgba(255,255,255,0.1); color:white; padding:12px 20px; border-radius:12px; font-size:0.9rem;}
input{flex:2; min-width:200px;}
.view-btn{cursor:pointer; background:var(--accent2); color:#000; font-weight:800; border:none; transition:0.3s; flex:1; min-width:180px;}
.view-btn:hover{filter:brightness(1.2); transform:translateY(-2px);}
