<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resource Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.9); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg); color:var(--text); min-height:100vh;}
.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}
header{padding:2rem; display:flex; justify-content:space-between; align-items:center; background:rgba(11,15,26,0.8); backdrop-filter:blur(10px);}
header h1{color:var(--accent); font-size:1.5rem;}
nav a{margin-left:1.5rem; color:var(--muted); text-decoration:none; font-weight:600;}
.container{max-width:1100px; margin:0 auto; padding:2rem;}
.controls{display:flex; gap:1rem; margin-bottom:2rem;}
input, select{background:var(--panel); border:1px solid rgba(255,255,255,0.1); color:white; padding:12px; border-radius:10px; flex:2;}
.view-btn{cursor:pointer; background:var(--accent2); color:#000; font-weight:800; border:none; padding:0 20px; border-radius:10px; flex:1;}
#mapWrapper{display:none; width:100%; height:400px; background:rgba(0,0,0,0.5); border-radius:20px; border:1px solid var(--accent); position:relative; margin-bottom:2rem; overflow:hidden; background-image: radial-gradient(var(--accent) 0.5px, transparent 0.5px); background-size: 20px 20px;}
.node{position:absolute; width:12px; height:12px; background:var(--accent); border-radius:50%; cursor:pointer; box-shadow:0 0 10px var(--accent);}
.node:hover::after{content:attr(data-label); position:absolute; bottom:20px; left:50%; transform:translateX(-50%); background:white; color:black; padding:4px 8px; border-radius:4px; font-size:0.7rem; white-space:nowrap; font-weight:bold;}
.resource-grid{display:grid; grid-template-columns: 1fr 1fr; gap:1.5rem;}
.card{background:var(--panel); padding:1.5rem; border-radius:15px; border:1px solid rgba(255,255,255,0.1);}
.card h3{color:var(--accent2); margin-bottom:5px;}
</style>
</head>
<body>
<div class="grid-lines"></div>
<header><h1>CivicLink OS</h1><nav><a href="index.html">Dashboard</a><a href="resources.html" style="color:var(--accent)">Resource Hub</a><a href="submit.html">Add Resource</a><a href="events.html">Events</a></nav></header>
<div class="container">
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search..." onkeyup="filter()">
    <select id="catFilter" onchange="filter()"><option value="all">All</option><option value="Health">Health</option><option value="Edu">Education</option></select>
    <button class="view-btn" onclick="toggleView()">MAP VIEW</button>
  </div>
  <div id="mapWrapper">
    <div class="node" style="top:30%; left:20%;" data-label="Food Security"></div>
    <div class="node" style="top:50%; left:60%;" data-label="Oasis Center"></div>
    <div class="node" style="top:70%; left:40%;" data-label="Tech Mentors"></div>
  </div>
  <div class="resource-grid" id="resourceList">
    <div class="card" data-cat="Health"><h3>The Oasis Center</h3><p>Crisis support node.</p></div>
    <div class="card" data-cat="Edu"><h3>TechForward</h3><p>STEM mentoring node.</p></div>
  </div>
</div>
<script>
function filter(){
  let val = document.getElementById('searchInput').value.toLowerCase();
  let cat = document.getElementById('catFilter').value;
  let cards = document.getElementsByClassName('card');
  for(let c of cards){
    let match = (cat==='all' || c.dataset.cat===cat) && c.innerText.toLowerCase().includes(val);
    c.style.display = match ? 'block' : 'none';
  }
}
function toggleView(){
  let m = document.getElementById('mapWrapper');
  let l = document.getElementById('resourceList');
  if(m.style.display === "none" || m.style.display === ""){
    m.style.display = "block"; l.style.display = "none";
  } else {
    m.style.display = "none"; l.style.display = "grid";
  }
}
</script>
</body>
</html>
