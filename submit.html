<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | Add Resource</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.85); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);}
.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}
header{padding:2rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.05);position:sticky;top:0;z-index:100;}
header h1{font-weight:800; color:var(--accent); font-size:1.5rem;}
nav a{margin-left:1.2rem;color:var(--muted);text-decoration:none;font-weight:600;font-size:0.85rem;}
nav a.active{color:var(--accent);}
.form-panel{max-width:600px; margin:4rem auto; background:var(--panel); padding:3rem; border-radius:24px; border:1px solid var(--accent); backdrop-filter:blur(12px);}
input, select, textarea{width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); color:white; padding:14px; border-radius:12px; margin-top:1rem; outline:none;}
button{width:100%; margin-top:2rem; padding:15px; background:var(--accent); color:#000; border:none; border-radius:12px; font-weight:800; cursor:pointer;}
footer{text-align:center; padding:3rem; color:var(--muted); font-size:0.8rem;}
</style>
</head>
<body>
<div class="grid-lines"></div>
<header>
  <h1>CivicLink OS</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="resources.html">Resource Hub</a>
    <a href="submit.html" class="active">Add Resource</a>
    <a href="events.html">Events</a>
    <a href="volunteer.html">Volunteer</a>
    <a href="about.html">About</a>
    <a href="references.html">References</a>
  </nav>
</header>
<div class="form-panel">
  <div style="font-family:monospace; color:var(--accent2); margin-bottom:10px;">UPLINK_INITIALIZED</div>
  <h2>Register Resource</h2>
  <form onsubmit="alert('Data Transmitted.'); return false;">
    <input type="text" placeholder="Provider Name" required>
    <select><option>Public Service</option><option>Private Non-Profit</option></select>
    <textarea rows="4" placeholder="Service Description"></textarea>
    <button type="submit">TRANSMIT DATA</button>
  </form>
</div>
<footer>&copy; 2026 Tesla STEM HS</footer>
</body>
</html>
