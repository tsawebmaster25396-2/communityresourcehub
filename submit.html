<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | Add Resource</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.85); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff; --muted:#9aa4c7;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:var(--text);overflow-x:hidden;}
.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}

header{padding:2rem;display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2;}
header h1{font-weight:800;}
nav a{margin-left:1.5rem;color:var(--muted);text-decoration:none;font-weight:600;}
nav a:hover{color:var(--accent);}

.panel{background:var(--panel);backdrop-filter:blur(15px);border-radius:20px;padding:3rem;margin:2rem auto;max-width:700px;border:1px solid rgba(255,255,255,0.1);}
.form-group{margin-bottom:1.5rem;}
label{display:block; margin-bottom:0.5rem; color:var(--accent2); font-weight:600; font-size:0.9rem;}
input, textarea, select{width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2); color:white; padding:12px; border-radius:10px; outline:none; transition:0.3s;}
input:focus, textarea:focus{border-color:var(--accent); box-shadow:0 0 10px rgba(61,242,194,0.2);}
.submit-btn{width:100%; background:var(--accent); color:#0b0f1a; border:none; padding:15px; border-radius:10px; font-weight:800; cursor:pointer; text-transform:uppercase; letter-spacing:1px;}
.submit-btn:hover{background:#2bc9a1;}

footer{text-align:center;padding:2rem;color:var(--muted);font-size:0.8rem;}
</style>
</head>
<body>
<div class="grid-lines"></div>
<header>
  <h1>CivicLink OS</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="resources.html">Resource Hub</a>
    <a href="submit.html" style="color:var(--accent)">Add Resource</a>
    <a href="events.html">Events</a>
    <a href="about.html">About</a>
    <a href="references.html">References</a>
  </nav>
</header>

<div class="panel">
  <h2 style="margin-bottom:1rem;">Submit New Resource</h2>
  <p style="color:var(--muted); margin-bottom:2rem;">Help us expand the community network. Submit a non-profit, service, or program for review.</p>
  
  <form id="resourceForm">
    <div class="form-group">
      <label>Resource Name</label>
      <input type="text" placeholder="e.g. Community Food Bank" required>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select>
        <option>Health & Wellness</option>
        <option>Education</option>
        <option>Crisis Support</option>
        <option>Community Program</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea rows="4" placeholder="Briefly describe the services provided..."></textarea>
    </div>
    <div class="form-group">
      <label>Contact Email/Website</label>
      <input type="text" placeholder="https://..." required>
    </div>
    <button type="submit" class="submit-btn">Initialize Submission</button>
  </form>
</div>

<footer>CivicLink OS | 2026 Internal Database Interface</footer>

<script>
document.getElementById('resourceForm').onsubmit = function(e) {
  e.preventDefault();
  alert("Resource data encrypted and sent for review. Thank you for contributing to CivicLink OS.");
  this.reset();
}
</script>
</body>
</html>
