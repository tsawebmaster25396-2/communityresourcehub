<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | Add Resource</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0f1a;
  --panel:rgba(18,26,47,0.85);
  --accent:#3df2c2;
  --accent2:#5aa9ff;
  --text:#e6ebff;
  --muted:#9aa4c7;
  --glass: blur(15px);
}

*{box-sizing:border-box; margin:0; padding:0; font-family:'Inter',sans-serif;}
body{background:var(--bg); color:var(--text); min-height:100vh; overflow-x: hidden;}

/* THE NUCLEAR CLEAN: This kills any leftover branding text */
footer, .tsa-branding, [id*="tesla"], [class*="tesla"] { 
    display: none !important; 
    opacity: 0 !important; 
    visibility: hidden !important; 
    pointer-events: none !important;
}

.grid-lines {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
    background: linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), 
                linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);
    background-size: 50px 50px;
}

header {
    padding: 2rem; display: flex; justify-content: space-between; align-items: center;
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000;
}
header h1 { font-weight: 800; color: var(--accent); font-size: 1.5rem; }
nav a { 
    margin-left: 1.2rem; color: var(--muted); text-decoration: none; 
    font-weight: 600; font-size: 0.85rem; transition: 0.3s; 
}
nav a:hover, nav a.active { color: var(--accent); }

.container { max-width: 800px; margin: 0 auto; padding: 4rem 2rem; }

.form-panel {
    background: var(--panel); backdrop-filter: var(--glass);
    padding: 3rem; border-radius: 30px; 
    border: 1px solid rgba(255,255,255,0.1); 
    border-top: 2px solid var(--accent);
    box-shadow: 0 0 30px rgba(61, 242, 194, 0.1);
}

.system-tag {
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent); font-size: 0.75rem; font-weight: bold;
    margin-bottom: 1.5rem; display: block; letter-spacing: 2px;
}

h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 2rem; letter-spacing: -1px; }

label { 
    display: block; font-family: 'JetBrains Mono', monospace; 
    font-size: 0.75rem; color: var(--accent2); margin-top: 1.5rem; text-transform: uppercase;
}

input, select, textarea {
    width: 100%; background: rgba(0,0,0,0.3); 
    border: 1px solid rgba(255,255,255,0.1); 
    color: white; padding: 15px; border-radius: 12px; 
    margin-top: 8px; outline: none; transition: 0.3s;
}

input:focus, select:focus, textarea:focus {
    border-color: var(--accent); background: rgba(0,0,0,0.5);
}

.transmit-btn {
    width: 100%; margin-top: 2.5rem; padding: 18px; 
    background: var(--accent); color: #0b0f1a; 
    border: none; border-radius: 12px; font-weight: 800; 
    cursor: pointer; transition: 0.3s; font-size: 1rem;
    letter-spacing: 2px; text-transform: uppercase;
}

.transmit-btn:hover {
    transform: translateY(-3px);
    background: #4dfcd0;
    box-shadow: 0 0 30px rgba(61, 242, 194, 0.5);
}

.bottom-spacer { height: 100px; }
</style>
</head>
<body>
<div class="grid-lines"></div>

<header>
  <h1>CivicLink OS</h1>
  <nav>
    <a href="index.html">Dashboard</a>
    <a href="resources.html">Resource Hub</a>
    <a href="submit.html" class="active">Add Resource</a>
    <a href="events.html">Events</a>
    <a href="volunteer.html">Volunteer</a>
    <a href="about.html">About</a>
    <a href="references.html">References</a>
  </nav>
</header>

<div class="container">
  <div class="form-panel">
    <span class="system-tag">INITIALIZING DATA_UPLINK... [OK]</span>
    <h2>Register Community Node</h2>
    
    <form onsubmit="alert('DATA_ENCRYPTED: Node information sent for moderation.'); return false;">
      <label>Node Identity</label>
      <input type="text" placeholder="e.g., Downtown Youth Center" required>
      
      <label>Operational Sector</label>
      <select>
        <option>Health & Wellness</option>
        <option>Education & Mentoring</option>
        <option>Food Security</option>
        <option>Legal Assistance</option>
      </select>
      
      <label>Node Description</label>
      <textarea rows="5" placeholder="Enter detailed service protocols..."></textarea>
      
      <label>Access Link (URL)</label>
      <input type="text" placeholder="https://">
      
      <button type="submit" class="transmit-btn">TRANSMIT DATA</button>
    </form>
  </div>
</div>

<div class="bottom-spacer"></div>

</body>
</html>
