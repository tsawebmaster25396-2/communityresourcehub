<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CivicLink OS | Add Resource</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b0f1a; --panel:rgba(18,26,47,0.85); --accent:#3df2c2; --accent2:#5aa9ff; --text:#e6ebff;}
body{background:var(--bg); color:var(--text); font-family:'Inter', sans-serif;}
.grid-lines{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;background:linear-gradient(rgba(61,242,194,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,242,194,0.05) 1px, transparent 1px);background-size:50px 50px;}
header{padding:2rem; display:flex; justify-content:space-between; align-items:center;}
nav a{margin-left:1.5rem; color:#9aa4c7; text-decoration:none; font-weight:600;}
.panel{max-width:600px; margin:3rem auto; background:var(--panel); padding:3rem; border-radius:20px; border:1px solid rgba(255,255,255,0.1);}
input, textarea, select{width:100%; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.2); color:white; padding:12px; border-radius:10px; margin-top:1rem;}
button{width:100%; margin-top:2rem; padding:15px; background:var(--accent); color:#000; border:none; border-radius:10px; font-weight:800; cursor:pointer;}
</style>
</head>
<body>
<div class="grid-lines"></div>
<header><h1>Submit Resource</h1>
<nav><a href="index.html">Dashboard</a><a href="resources.html">Resource Hub</a><a href="submit.html" style="color:var(--accent)">Add Resource</a></nav>
</header>
<div class="panel">
  <div style="font-family:monospace; color:var(--accent); margin-bottom:1rem;">SYSTEM > INPUT_FORM</div>
  <h2>Register New Community Node</h2>
  <form onsubmit="alert('Resource Data Encrypted. Sent for review.'); return false;">
    <input type="text" placeholder="Resource Name" required>
    <select><option>Non-Profit</option><option>Support Service</option><option>Community Event</option></select>
    <textarea rows="4" placeholder="Brief Description of Service"></textarea>
    <input type="text" placeholder="Official Website URL">
    <button type="submit">TRANSMIT DATA</button>
  </form>
</div>
</body>
</html>
